name: Deploy Clyx Backend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script_stop: true
          script: |
            set -e
            DEPLOY_DIR=/var/www/clyxmain/backend
            mkdir -p "$DEPLOY_DIR"
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              git clone --depth=1 git@github.com:ammarshamea/clyx_backend.git "$DEPLOY_DIR"
              if [ ! -f "$DEPLOY_DIR/.env" ]; then
                echo "ERROR: $DEPLOY_DIR/.env missing. Create it on the server first (see deployment docs)."
                exit 1
              fi
            fi
            cd "$DEPLOY_DIR"
            git fetch origin main
            git reset --hard origin/main

            COMPOSER_ALLOW_SUPERUSER=1 composer install --no-dev --optimize-autoloader --no-interaction
            php artisan migrate --force
            php artisan storage:link || true
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            chown -R www-data:www-data storage bootstrap/cache
            chmod -R ug+rwX storage bootstrap/cache
